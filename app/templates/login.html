{% extends "base.html" %}

{% block title %}Login | CineMatch AI{% endblock %}

{% block content %}
<section class="auth-shell reveal">
    <form method="post" class="auth-card">
        <p class="eyebrow">WELCOME BACK</p>
        <h1>Login to your profile</h1>
        <p class="muted">Access your ratings and personalized suggestions.</p>

        <label>Email</label>
        <input type="email" name="email" placeholder="you@example.com" required>

        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password" required>

        <button class="button primary" type="submit">Login</button>
        <p class="muted">New here? <a class="text-link" href="{{ url_for('register') }}">Create account</a></p>
    </form>
</section>
{% endblock %}
