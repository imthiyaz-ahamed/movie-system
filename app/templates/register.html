{% extends "base.html" %}

{% block title %}Register | CineMatch AI{% endblock %}

{% block content %}
<section class="auth-shell reveal">
    <form method="post" class="auth-card" enctype="multipart/form-data">
        <p class="eyebrow">GET STARTED</p>
        <h1>Build your movie profile</h1>
        <p class="muted">Create your account and start training the recommendation engine.</p>

        <label>Username</label>
        <input type="text" name="username" placeholder="Choose username" required>

        <label>Email</label>
        <input type="email" name="email" placeholder="you@example.com" required>

        <label>Password</label>
        <input type="password" name="password" placeholder="Create password" required>

        <label>Profile Picture (optional)</label>
        <input type="file" name="profile_picture" accept=".png,.jpg,.jpeg,.webp,.gif">

        <button class="button primary" type="submit">Register</button>
        <p class="muted">Already a member? <a class="text-link" href="{{ url_for('login') }}">Login</a></p>
    </form>
</section>
{% endblock %}
